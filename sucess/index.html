<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requisição</title>
  <meta name="description" content="Tela de confirmação e erro da requisição de materiais." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="result-page">
  <main class="result-shell">
    <section class="result-card">
      <p class="result-eyebrow" id="resultEyebrow">Requisição</p>
      <h1 id="resultTitle">Carregando...</h1>
      <p class="result-copy" id="resultMessage">Preparando os dados da sua requisição.</p>

      <div class="result-banner" id="resultBanner" aria-live="polite"></div>

      <dl class="result-grid" id="resultSummary"></dl>

      <div class="result-actions">
        <button type="button" class="result-primary" id="primaryAction">Enviar Requisição</button>
      </div>

      <p class="result-footnote" id="resultFootnote"></p>
    </section>
  </main>

  <script src="../config.js"></script>
  <script src="script.js"></script>
</body>
</html>
